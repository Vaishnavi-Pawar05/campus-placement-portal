<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CampusHire – My Applications</title>

<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="application status.css">
</head>

<body>

<nav class="navbar">
  <a class="nav-logo" href="#">
    <span class="nav-logo-dot"></span>CampusHire
  </a>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Jobs</a>
    <a class="active" href="#">Applications</a>
    <a href="#">Dashboard</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
  <div class="nav-cta">
    <button class="btn btn-outline">Login</button>
    <button class="btn btn-primary">Register Free</button>
  </div>
</nav>

<div class="page-wrap">

<section class="header">

<h1>📂 My Applications</h1>
<p>Track all your job applications in one place</p>

<button class="add">+ Add Application</button>

</section>


<div class="modal" id="applicationModal">

<div class="modal-content">

<span class="close">&times;</span>

<h2>Add Application</h2>

<form id="appForm">

<label>Company Name</label>
<input type="text" placeholder="Enter company name" required>

<label>Role</label>
<input type="text" placeholder="Enter job role" required>

<label>Application ID</label>
<input type="text" placeholder="Example: UJP101" required>

<label>Status</label>
<select>
<option>Applied</option>
<option>In Review</option>
<option>Interview</option>
<option>Offered</option>
<option>Rejected</option>
</select>

<label>Date</label>
<input type="date" required>

<button type="submit" class="submit-btn">Add Application</button>

</form>

</div>
</div>

<section class="stats">

<div class="stat">
<h2>12</h2>
<p>Applied</p>
</div>

<div class="stat">
<h2>4</h2>
<p>In Review</p>
</div>

<div class="stat">
<h2>2</h2>
<p>Interview</p>
</div>

<div class="stat">
<h2>1</h2>
<p>Offer</p>
</div>

<div class="stat">
<h2>3</h2>
<p>Rejected</p>
</div>

</section>


<section class="applications">

<div class="card">

<h3>Frontend Developer</h3>
<p class="company">Google</p>

<span class="badge review">In Review</span>

<script src="application status.js"></script>

</body>
</html>
